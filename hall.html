<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>天启帝国 - 王者大厅</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;
}

body{
height:100vh;
background:
linear-gradient(rgba(0,0,0,.45),rgba(0,0,0,.65)),
url("https://images.unsplash.com/photo-1511512578047-dfb367046420");
background-size:cover;
background-position:center;
color:white;
overflow:hidden;
}

.top{
display:flex;
justify-content:space-between;
padding:15px;
background:rgba(0,0,0,.35);
backdrop-filter:blur(8px);
}

.player{
font-size:22px;
font-weight:bold;
color:gold;
}

.resource{
display:flex;
gap:15px;
font-size:18px;
}

.hero{
text-align:center;
margin-top:20px;
}

.hero img{
width:180px;
border-radius:20px;
box-shadow:0 0 30px gold;
}

.hero h1{
margin-top:10px;
color:gold;
font-size:36px;
}

.hero p{
margin-top:10px;
font-size:20px;
}

.play-btn{
display:block;
width:85%;
margin:20px auto;
padding:18px;
border:none;
border-radius:20px;
font-size:24px;
font-weight:bold;
background:linear-gradient(45deg,#ffd700,#ff9900);
}

.menu{
padding:15px;
display:grid;
grid-template-columns:1fr 1fr;
gap:15px;
}

.card{
background:rgba(255,255,255,.08);
border:1px solid rgba(255,255,255,.15);
backdrop-filter:blur(10px);
border-radius:20px;
padding:20px;
text-align:center;
font-size:20px;
}

.bottom{
position:fixed;
bottom:0;
left:0;
width:100%;
display:flex;
justify-content:space-around;
background:#111;
padding:12px;
}

.bottom div{
font-size:18px;
}
</style>

</head>

<body>

<div class="top">

<div class="player">
👑 杨濰鋒
</div>

<div class="resource">
<span>🪙1000</span>
<span>💎100</span>
<span>⭐1</span>
</div>

</div>

<div class="hero">

<img src="https://cdn-icons-png.flaticon.com/512/4140/4140048.png">

<h1>⚔️ 亚瑟</h1>

<p>战力：5000</p>

</div>

<button class="play-btn">
🔥 开始匹配
</button>

<div class="menu">

<div class="card" onclick="location.href='battle.html'">
🐉 龙王副本
</div>

<div class="card" onclick="location.href='hero.html'">
⚔️ 英雄殿堂
</div>

<div class="card">
🏆 排位赛
</div>

<div class="card">
🛒 商城
</div>

</div>

<div class="bottom">

<div>🏠首页</div>

<div>⚔️英雄</div>

<div>🎒背包</div>

<div>👥战队</div>

<div>🛒商城</div>

</div>

</body>
</html>
