<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>英雄殿堂</title>

<style>

body{
margin:0;
background:linear-gradient(#081b3a,#000);
font-family:Arial;
color:white;
}

h1{
text-align:center;
color:gold;
padding:20px;
font-size:40px;
text-shadow:0 0 15px gold;
}

.hero-grid{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:15px;
padding:15px;
}

.hero{
background:rgba(255,255,255,.08);
border-radius:20px;
padding:15px;
text-align:center;
border:1px solid rgba(255,255,255,.15);
}

.hero:hover{
transform:scale(1.03);
}

.icon{
font-size:60px;
}

.name{
font-size:22px;
color:gold;
margin-top:10px;
}

.role{
color:#ccc;
margin-top:5px;
}

button{
margin-top:10px;
padding:10px 20px;
border:none;
border-radius:15px;
background:gold;
font-weight:bold;
}

#selected{
position:sticky;
top:0;
background:#111;
padding:15px;
text-align:center;
font-size:22px;
color:gold;
}

</style>
</head>

<body>

<h1>⚔️ 英雄殿堂 ⚔️</h1>

<div id="selected">
当前英雄：未选择
</div>

<div class="hero-grid">

<div class="hero">
<div class="icon">⚔️</div>
<div class="name">亚瑟</div>
<div class="role">战士</div>
<button onclick="pickHero('亚瑟')">选择</button>
</div>

<div class="hero">
<div class="icon">🐉</div>
<div class="name">赵云</div>
<div class="role">战士</div>
<button onclick="pickHero('赵云')">选择</button>
</div>

<div class="hero">
<div class="icon">🐒</div>
<div class="name">悟空</div>
<div class="role">刺客</div>
<button onclick="pickHero('悟空')">选择</button>
</div>

<div class="hero">
<div class="icon">🏹</div>
<div class="name">后羿</div>
<div class="role">射手</div>
<button onclick="pickHero('后羿')">选择</button>
</div>

<div class="hero">
<div class="icon">🦊</div>
<div class="name">妲己</div>
<div class="role">法师</div>
<button onclick="pickHero('妲己')">选择</button>
</div>

<div class="hero">
<div class="icon">⚡</div>
<div class="name">诸葛亮</div>
<div class="role">法师</div>
<button onclick="pickHero('诸葛亮')">选择</button>
</div>

<div class="hero">
<div class="icon">🛡️</div>
<div class="name">吕布</div>
<div class="role">战士</div>
<button onclick="pickHero('吕布')">选择</button>
</div>

<div class="hero">
<div class="icon">🌙</div>
<div class="name">嫦娥</div>
<div class="role">法师</div>
<button onclick="pickHero('嫦娥')">选择</button>
</div>

<div class="hero">
<div class="icon">🌪️</div>
<div class="name">李白</div>
<div class="role">刺客</div>
<button onclick="pickHero('李白')">选择</button>
</div>

<div class="hero">
<div class="icon">🔥</div>
<div class="name">关羽</div>
<div class="role">战士</div>
<button onclick="pickHero('关羽')">选择</button>
</div>

</div>

<script>

function pickHero(hero){

localStorage.setItem("hero",hero);

document.getElementById("selected").innerHTML=
"当前英雄："+hero;

alert("已选择英雄："+hero);

}

let currentHero =
localStorage.getItem("hero");

if(currentHero){

document.getElementById("selected").innerHTML=
"当前英雄："+currentHero;

}

</script>

</body>
</html>
