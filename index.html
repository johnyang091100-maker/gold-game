<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>天启帝国</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;
}

body{
background:linear-gradient(to bottom,#020b3d,#04186d);
color:white;
text-align:center;
min-height:100vh;
padding:20px;
}

.logo{
font-size:50px;
color:gold;
font-weight:bold;
text-shadow:0 0 20px gold;
margin-top:20px;
}

.player{
background:rgba(255,255,255,.08);
padding:20px;
border-radius:20px;
margin-top:20px;
}

.avatar{
font-size:70px;
}

.name{
font-size:24px;
font-weight:bold;
margin-top:10px;
}

.vip{
color:gold;
margin-top:5px;
}

.stats{
display:grid;
grid-template-columns:1fr 1fr;
gap:15px;
margin-top:20px;
}

.card{
background:rgba(255,255,255,.08);
padding:20px;
border-radius:15px;
font-size:18px;
}

.menu{
margin-top:30px;
display:grid;
grid-template-columns:1fr 1fr;
gap:15px;
}

.btn{
background:gold;
color:black;
padding:18px;
border-radius:15px;
font-size:20px;
font-weight:bold;
border:none;
}

.btn:hover{
transform:scale(1.05);
}

.start{
margin-top:25px;
background:#ff5722;
color:white;
padding:20px;
font-size:24px;
border:none;
border-radius:50px;
width:100%;
font-weight:bold;
}

.footer{
margin-top:30px;
opacity:.8;
}
</style>

</head>

<body>

<div class="logo">
👑 天启帝国 👑
</div>

<div class="player">

<div class="avatar">🤴</div>

<div class="name">
国王陛下
</div>

<div class="vip">
⭐ VIP 1 ⭐
</div>

</div>

<div class="stats">

<div class="card">
💰 金币<br><b>1000</b>
</div>

<div class="card">
💎 钻石<br><b>500</b>
</div>

<div class="card">
⚔️ 战力<br><b>100</b>
</div>

<div class="card">
🏰 王国等级<br><b>1</b>
</div>

</div>

<div class="menu">

<button class="btn">
🎁 每日签到
</button>

<button class="btn">
🛒 帝国商城
</button>

<button class="btn">
⚔️ 征战世界
</button>

<button class="btn">
🏆 排行榜
</button>

</div>

<button class="start">
🚀 开始冒险
</button>

<div class="footer">
🔥 征服世界 · 建立联盟 · 成为传奇 🔥
</div>

<script>

window.onload=function(){

let msg=new SpeechSynthesisUtterance(
"欢迎来到天启帝国，伟大的国王陛下"
);

msg.lang="zh-CN";
msg.rate=0.9;
msg.pitch=0.9;

speechSynthesis.speak(msg);

}

</script>

</body>
</html>
