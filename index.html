<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>天启帝国 RPG</title>

<style>
body{
background:#0b1020;
color:white;
font-family:Arial;
text-align:center;
padding:20px;
}

h1{
color:gold;
}

.card{
background:#1a2338;
padding:15px;
margin:15px auto;
border-radius:15px;
max-width:400px;
}

button{
padding:15px 25px;
border:none;
border-radius:10px;
background:gold;
font-weight:bold;
font-size:18px;
margin:5px;
}

.enemy{
font-size:28px;
color:#7CFC00;
}

#log{
background:black;
padding:10px;
height:180px;
overflow:auto;
text-align:left;
border-radius:10px;
}
</style>

</head>

<body>

<h1>👑 天启帝国 RPG 👑</h1>

<div class="card">
🤴 国王等级：<span id="level">1</span><br>
⭐ 经验：<span id="exp">0</span> / <span id="need">100</span><br>
⚔️ 攻击：<span id="attack">10</span><br>
💰 金币：<span id="gold">100</span>
</div>

<div class="card">
<div class="enemy">👺 哥布林</div>
❤️ 血量：<span id="hp">50</span>
<br><br>
<button onclick="attackMonster()">
⚔️ 攻击哥布林
</button>
</div>

<div class="card">
<h3>📜 战斗记录</h3>
<div id="log"></div>
</div>

<script>

let level = Number(localStorage.getItem("level")) || 1;
let exp = Number(localStorage.getItem("exp")) || 0;
let gold = Number(localStorage.getItem("gold")) || 100;

let attack = level * 10;
let hp = Number(localStorage.getItem("hp")) || 50;

function save(){
localStorage.setItem("level",level);
localStorage.setItem("exp",exp);
localStorage.setItem("gold",gold);
localStorage.setItem("hp",hp);
}

function log(text){
document.getElementById("log").innerHTML =
text + "<br>" +
document.getElementById("log").innerHTML;
}

function update(){

attack = level * 10;

document.getElementById("level").innerHTML = level;
document.getElementById("exp").innerHTML = exp;
document.getElementById("need").innerHTML = level*100;
document.getElementById("attack").innerHTML = attack;
document.getElementById("gold").innerHTML = gold;
document.getElementById("hp").innerHTML = hp;

save();
}

function attackMonster(){

let damage = Math.floor(Math.random()*attack)+5;

hp -= damage;

log("⚔️ 造成 "+damage+" 伤害");

if(hp<=0){

gold += 50;
exp += 30;

log("🎉 击败哥布林");
log("💰 获得50金币");
log("⭐ 获得30经验");

hp = 50 + (level*20);

if(exp >= level*100){

exp = 0;
level++;

log("👑 升级成功！");
log("🏆 等级提升到 Lv."+level);

}

}

update();

}

window.onload=function(){

update();

let msg=new SpeechSynthesisUtterance(
"欢迎来到天启帝国，伟大的国王陛下"
);

msg.lang="zh-CN";
msg.rate=0.9;
msg.pitch=0.8;

speechSynthesis.speak(msg);

}
</script>

</body>
</html>
