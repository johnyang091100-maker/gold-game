<!DOCTYPE html>
<html>

<head>
<meta charset="UTF-8">
<title>天启帝国</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;
}

body{
background:
linear-gradient(rgba(0,0,0,.4),rgba(0,0,0,.7)),
url("https://images.unsplash.com/photo-1518562180175-34a163b1a9a6");
background-size:cover;
background-position:center;
min-height:100vh;
color:white;
padding:20px;
}

.title{
text-align:center;
font-size:40px;
color:gold;
font-weight:bold;
text-shadow:0 0 20px gold;
margin-bottom:20px;
}

.resources{
display:flex;
justify-content:space-between;
margin-bottom:20px;
}

.resource{
background:rgba(0,0,0,.5);
padding:10px;
border-radius:10px;
width:48%;
text-align:center;
}

.city{
background:rgba(0,0,0,.5);
padding:20px;
border-radius:20px;
text-align:center;
margin-bottom:20px;
}

.castle{
font-size:80px;
}

.level{
margin-top:10px;
font-size:22px;
}

.buildings{
display:grid;
grid-template-columns:1fr 1fr;
gap:15px;
}

.building{
background:rgba(0,0,0,.5);
padding:20px;
border-radius:15px;
text-align:center;
font-size:22px;
}

.building:hover{
transform:scale(1.05);
}

.btn{
margin-top:20px;
width:100%;
padding:18px;
border:none;
border-radius:50px;
background:gold;
font-size:22px;
font-weight:bold;
}

.footer{
text-align:center;
margin-top:20px;
}

</style>

</head>

<body>

<div class="title">
👑 天启帝国 👑
</div>

<div class="resources">

<div class="resource">
💰 金币
<h2 id="gold">1000</h2>
</div>

<div class="resource">
💎 钻石
<h2 id="diamond">500</h2>
</div>

</div>

<div class="city">

<div class="castle">
🏰
</div>

<div class="level">
主城 Lv.<span id="level">1</span>
</div>

<div>
⚔️ 战力：<span id="power">100</span>
</div>

</div>

<div class="buildings">

<div class="building" onclick="upgrade()">
🏰<br>
升级主城
</div>

<div class="building" onclick="signin()">
🎁<br>
每日签到
</div>

<div class="building">
🛒<br>
帝国商城
</div>

<div class="building">
🏆<br>
排行榜
</div>

<div class="building">
⚔️<br>
世界征战
</div>

<div class="building">
👥<br>
联盟系统
</div>

</div>

<button class="btn" onclick="startGame()">
🚀 开始征战
</button>

<div class="footer">
🔥 征服世界 · 建立联盟 · 成为传奇 🔥
</div>

<script>

let gold=1000;
let level=1;
let power=100;

window.onload=function(){

let msg=new SpeechSynthesisUtterance(
"欢迎来到天启帝国，伟大的国王陛下，您的子民正在等待您的命令"
);

msg.lang="zh-CN";
msg.rate=0.85;
msg.pitch=0.8;

speechSynthesis.speak(msg);

}

setInterval(()=>{

gold+=10;

document.getElementById("gold").innerHTML=gold;

},1000);

function upgrade(){

if(gold>=500){

gold-=500;

level++;

power+=100;

document.getElementById("gold").innerHTML=gold;
document.getElementById("level").innerHTML=level;
document.getElementById("power").innerHTML=power;

alert("🏰 主城升级成功！");

}else{

alert("金币不足");

}

}

function signin(){

gold+=200;

document.getElementById("gold").innerHTML=gold;

alert("🎁 获得200金币");

}

function startGame(){

alert("⚔️ 世界征战即将开放");

}

</script>

</body>
</html>
