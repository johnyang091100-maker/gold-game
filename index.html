<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>天启帝国</title>

<style>
body{
margin:0;
font-family:Arial;
color:white;
background:
linear-gradient(rgba(0,0,0,.45),rgba(0,0,0,.7)),
url('https://images.unsplash.com/photo-1511818966892-d7d671e672a2');
background-size:cover;
background-position:center;
min-height:100vh;
}

.top{
display:flex;
justify-content:space-around;
padding:15px;
background:rgba(0,0,0,.4);
}

.box{
background:rgba(255,255,255,.1);
padding:10px 20px;
border-radius:15px;
}

.title{
text-align:center;
font-size:42px;
color:gold;
font-weight:bold;
margin-top:20px;
text-shadow:0 0 20px gold;
}

.king{
text-align:center;
margin-top:20px;
}

.king img{
width:120px;
}

.city{
text-align:center;
font-size:100px;
margin-top:20px;
animation:float 2s infinite alternate;
}

@keyframes float{
from{transform:translateY(0);}
to{transform:translateY(-10px);}
}

.menu{
display:grid;
grid-template-columns:1fr 1fr;
gap:15px;
padding:20px;
}

.card{
background:rgba(0,0,0,.5);
padding:20px;
border-radius:20px;
text-align:center;
font-size:22px;
}

.start{
display:block;
width:85%;
margin:20px auto;
padding:18px;
font-size:24px;
font-weight:bold;
background:gold;
border:none;
border-radius:50px;
}

.quest{
background:rgba(0,0,0,.5);
margin:20px;
padding:15px;
border-radius:15px;
}
</style>
</head>

<body>

<div class="top">
<div class="box">💰 1000</div>
<div class="box">💎 500</div>
<div class="box">⚔️ 100</div>
</div>

<div class="title">
👑 天启帝国 👑
</div>

<div class="king">
🤴<br>
国王陛下 Lv.1
</div>

<div class="city">
🏰
</div>

<div class="menu">

<div class="card">⚔️ 征战</div>
<div class="card">🏹 兵营</div>
<div class="card">🛒 商城</div>
<div class="card">🎁 签到</div>
<div class="card">👥 联盟</div>
<div class="card">🏆 排行榜</div>

</div>

<div class="quest">
📜 主线任务：建立你的第一座帝国
</div>

<button class="start">
🚀 开始冒险
</button>

<script>

window.onload=function(){

setTimeout(function(){

let msg=new SpeechSynthesisUtterance(
"欢迎来到天启帝国，伟大的国王陛下。您的子民正在等待您的统治。"
);

msg.lang="zh-CN";
msg.rate=0.85;
msg.pitch=0.7;

speechSynthesis.speak(msg);

},1000);

}

</script>

</body>
</html>
