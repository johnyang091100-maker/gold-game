<body>

<div id="loading">
  <div class="flash"></div>

  <div class="logo">
      👑
  </div>

  <h1>天启帝国</h1>

  <p>伟大的国王陛下</p>

  <button onclick="startGame()">
      ⚔️ 开始征途
  </button>
</div>

<audio id="bgm" autoplay loop>
  <source src="bgm.mp3" type="audio/mpeg">
</audio>

<script>

function startGame(){

let msg=new SpeechSynthesisUtterance(
"欢迎来到天启帝国，伟大的国王陛下"
);

msg.lang="zh-CN";
msg.rate=0.85;
msg.pitch=0.8;

speechSynthesis.speak(msg);

setTimeout(()=>{
location.href="hall.html";
},3000);

}

</script>

</body>
