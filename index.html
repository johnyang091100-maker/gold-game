<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>杨氏商业帝国</title>

<style>
body{
margin:0;
font-family:Arial;
background:#111827;
color:white;
}

.header{
background:linear-gradient(90deg,#f59e0b,#fbbf24);
padding:20px;
font-size:28px;
font-weight:bold;
text-align:center;
color:black;
}

.profile{
padding:20px;
text-align:center;
}

.avatar{
font-size:60px;
}

.card{
background:#1f2937;
margin:15px;
padding:20px;
border-radius:15px;
}

.money{
font-size:32px;
color:gold;
font-weight:bold;
}

button{
padding:15px 25px;
margin:10px;
font-size:18px;
border:none;
border-radius:12px;
background:gold;
font-weight:bold;
}

.menu{
display:grid;
grid-template-columns:1fr 1fr;
gap:10px;
padding:15px;
}

.box{
background:#374151;
padding:20px;
border-radius:15px;
text-align:center;
font-size:20px;
}
</style>
</head>

<body>

<div class="header">
🏢 杨氏商业帝国
</div>

<div class="profile">
<div class="avatar">👑</div>
<h2>CEO：John Yang</h2>
</div>

<div class="card">
<p>等级：1</p>
<p class="money">金币：0</p>

<button onclick="earnMoney()">💰 赚钱</button>
<button onclick="upgrade()">⬆️ 升级公司</button>
</div>

<div class="menu">
<div class="box">🏭 工厂</div>
<div class="box">🚗 豪车</div>
<div class="box">🏠 房地产</div>
<div class="box">👨‍💼 员工</div>
<div class="box">🏆 排行榜</div>
<div class="box">🎁 活动</div>
</div>

<script>
let money = 0;
let level = 1;

function earnMoney(){
money += 100;
update();
}

function upgrade(){
if(money >= 500){
money -= 500;
level++;
update();
}else{
alert("金币不足！");
}
}

function update(){
document.querySelector(".money").innerHTML="金币："+money;
document.querySelector("p").innerHTML="等级："+level;
}
</script>

</body>
</html>
