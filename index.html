<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>天启帝国</title>

<style>
body{
margin:0;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(#000428,#004e92);
font-family:Arial;
color:white;
}

.box{
text-align:center;
}

h1{
font-size:50px;
color:gold;
text-shadow:0 0 20px gold;
}

p{
font-size:20px;
}

button{
margin-top:20px;
padding:18px 50px;
font-size:24px;
background:gold;
border:none;
border-radius:50px;
font-weight:bold;
}
</style>
</head>

<body>

<div class="box">

<h1>👑 天启帝国 👑</h1>

<p>永恒王座</p>

<button onclick="enterEmpire()">
⚔️ 进入帝国
</button>

</div>

<script>

function enterEmpire(){

const msg = new SpeechSynthesisUtterance(
"欢迎来到天启帝国，伟大的国王陛下"
);

msg.lang="zh-CN";

speechSynthesis.speak(msg);

setTimeout(function(){

document.body.innerHTML=`

<div style="
text-align:center;
padding-top:50px;
color:white;
font-family:Arial;
">

<h1 style="color:gold">
🏰 帝国大厅
</h1>

<h2>🤴 国王陛下</h2>

<p>💰 金币: 1000</p>

<p>💎 钻石: 500</p>

<p>⚔️ 战力: 100</p>

<button onclick="alert('征战系统开发中')"
style="
padding:15px 40px;
font-size:22px;
background:gold;
border:none;
border-radius:30px;
">
⚔️ 开始征战
</button>

</div>

`;

},2500);

}

</script>

</body>
</html>
