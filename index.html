<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>👑 天启帝国 👑</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
height:100vh;
background:url("https://images.unsplash.com/photo-1518562180175-34a163b1a9a6?q=80&w=1200") center center/cover no-repeat;
overflow:hidden;
}

.overlay{
width:100%;
height:100%;
background:rgba(0,0,0,0.55);
display:flex;
justify-content:center;
align-items:center;
}

.box{
text-align:center;
color:white;
}

.logo{
font-size:90px;
animation:glow 2s infinite alternate;
}

.title{
font-size:60px;
color:gold;
text-shadow:0 0 25px gold;
margin-top:10px;
}

.sub{
margin-top:10px;
letter-spacing:8px;
font-size:20px;
}

.btn{
margin-top:35px;
padding:18px 60px;
font-size:24px;
font-weight:bold;
border:none;
border-radius:50px;
background:gold;
cursor:pointer;
box-shadow:0 0 25px gold;
}

.btn:hover{
transform:scale(1.05);
}

.footer{
position:absolute;
bottom:30px;
width:100%;
text-align:center;
color:white;
font-size:18px;
}

@keyframes glow{
from{
filter:drop-shadow(0 0 10px gold);
}
to{
filter:drop-shadow(0 0 30px gold);
}
}
</style>
</head>

<body>

<div class="overlay">

<div class="box">

<div class="logo">👑</div>

<div class="title">天启帝国</div>

<div class="sub">永 恒 王 座</div>

<button class="btn" onclick="startGame()">
⚔️ 进入帝国
</button>

</div>

<div class="footer">
🔥 征服世界 · 建立联盟 · 攻打部落 🔥
</div>

</div>

<script>

function startGame(){

let msg = new SpeechSynthesisUtterance(
"欢迎来到天启帝国，伟大的国王陛下。"
);

msg.lang="zh-CN";

speechSynthesis.speak(msg);

setTimeout(function(){

document.body.innerHTML = `

<div style="
background:#050f2c;
height:100vh;
color:white;
text-align:center;
padding-top:80px;
">

<h1 style="
color:gold;
font-size:50px;
margin-bottom:30px;
">
👑 游戏大厅 👑
</h1>

<div style="
background:#111a45;
width:300px;
margin:auto;
padding:20px;
border-radius:15px;
margin-bottom:15px;
">
💰 金币：1000
</div>

<div style="
background:#111a45;
width:300px;
margin:auto;
padding:20px;
border-radius:15px;
margin-bottom:15px;
">
⚔️ 战力：100
</div>

<div style="
background:#111a45;
width:300px;
margin:auto;
padding:20px;
border-radius:15px;
margin-bottom:15px;
">
🏰 王国等级：1
</div>

<button onclick="alert('开始征战！')"
style="
padding:15px 40px;
font-size:22px;
background:gold;
border:none;
border-radius:40px;
font-weight:bold;
">
🚀 开始游戏
</button>

</div>
`;

},3000);

}
</script>

</body>
</html>
