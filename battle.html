<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>天启帝国 - 巨龙之战</title>

<style>

body{
margin:0;
height:100vh;
background:
linear-gradient(rgba(0,0,0,.4),rgba(0,0,0,.6)),
url("https://images.unsplash.com/photo-1518562180175-34a163b1a9a6?auto=format&fit=crop&w=1200&q=80");
background-size:cover;
background-position:center;
font-family:Arial;
color:white;
text-align:center;
overflow:hidden;
}

.title{
margin-top:30px;
font-size:42px;
font-weight:bold;
color:#ffd700;
text-shadow:0 0 20px gold;
}

.dragon{
font-size:120px;
animation:float 2s infinite alternate;
}

@keyframes float{
from{transform:translateY(0);}
to{transform:translateY(-15px);}
}

.hpbox{
width:80%;
height:30px;
margin:auto;
background:#222;
border-radius:30px;
overflow:hidden;
}

.hp{
height:100%;
width:100%;
background:linear-gradient(90deg,#ff0000,#ff6600);
transition:0.3s;
}

button{
margin-top:25px;
padding:18px 50px;
font-size:24px;
border:none;
border-radius:20px;
background:gold;
font-weight:bold;
}

#log{
margin-top:30px;
font-size:24px;
font-weight:bold;
color:#fff;
}

</style>
</head>

<body>

<div class="title">
🐉 巨龙之王降临 🐉
</div>

<div class="dragon">
🐲
</div>

<div class="hpbox">
<div class="hp" id="hp"></div>
</div>

<h2 id="hpText">
Boss生命：100
</h2>

<button onclick="attack()">
⚔️ 发动攻击
</button>

<div id="log">
准备迎战巨龙...
</div>

<script>

let hp=100;

function attack(){

let damage=
Math.floor(Math.random()*25)+10;

hp-=damage;

if(hp<0) hp=0;

document.getElementById("hpText").innerHTML=
"Boss生命："+hp;

document.getElementById("hp").style.width=
hp+"%";

if(damage>=30){
document.getElementById("log").innerHTML=
"💥 暴击！造成 "+damage+" 点伤害";
}else{
document.getElementById("log").innerHTML=
"⚔️ 造成 "+damage+" 点伤害";
}

if(hp<=0){

document.getElementById("log").innerHTML=
"🏆 巨龙已被击败！获得100金币！";

setTimeout(()=>{
alert("👑 恭喜国王陛下凯旋归来！");
},500);

}

}

</script>

</body>
</html>
